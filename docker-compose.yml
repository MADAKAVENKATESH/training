services:
  mongo:
    image: mongo:7
    container_name: mernapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mernapp-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/mernapp
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/todoapp
      dockerfile: Dockerfile
    container_name: mernapp-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
